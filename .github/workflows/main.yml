name: DTAP Pipeline

on:
  push:
    branches: [main]

jobs:
  development:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: |
          mkdir -p out
          javac -encoding UTF-8 src/presentation/*.java src/slide/*.java src/accessor/*.java src/controller/*.java src/JabberPoint.java -d out

      - name: Check coding conventions (Checkstyle)
        run: |
          wget -q https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar -O checkstyle.jar
          java -jar checkstyle.jar -c .github/checkstyle.xml src/presentation/*.java src/slide/*.java src/accessor/*.java src/controller/*.java src/JabberPoint.java

  testing:
    runs-on: ubuntu-latest
    environment: testing
    needs: development
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build source files
        run: |
          mkdir -p out
          javac -encoding UTF-8 -cp lib/junit-platform-console-standalone.jar src/presentation/*.java src/slide/*.java src/accessor/*.java src/controller/*.java src/JabberPoint.java -d out

      - name: Compile test files
        run: javac -encoding UTF-8 -cp lib/junit-platform-console-standalone.jar:out test/PresentationObserverTest.java -d out

      - name: Run JUnit 5 tests
        run: |
          java -jar lib/junit-platform-console-standalone.jar \
            --classpath out \
            --scan-classpath \
            --fail-if-no-tests

      - name: Verify all files compile
        run: echo "All files compiled and tested successfully"

  acceptance:
    runs-on: windows-latest
    environment: acceptance
    needs: testing
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        shell: bash
        run: |
          mkdir -p out
          javac -encoding UTF-8 src/presentation/*.java src/slide/*.java src/accessor/*.java src/controller/*.java src/JabberPoint.java -d out

      - name: Package application
        shell: bash
        run: jar cvf jabberpoint.jar -C out .

  production:
    runs-on: ubuntu-latest
    environment: production
    needs: acceptance
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: |
          mkdir -p out
          javac -encoding UTF-8 src/presentation/*.java src/slide/*.java src/accessor/*.java src/controller/*.java src/JabberPoint.java -d out

      - name: Package final application
        run: jar cvf jabberpoint-release.jar -C out .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jabberpoint-release
          path: jabberpoint-release.jar
          retention-days: 30