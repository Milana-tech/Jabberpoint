name: DTAP Pipeline

on:
  push:
    branches: [main]

jobs:
  development:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: javac src/*.java

  testing:
    runs-on: ubuntu-latest
    environment: testing
    needs: development
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: javac src/*.java
      - name: Verify all files compile
        run: |
          javac src/*.java
          echo "All files compiled successfully"

  acceptance:
    runs-on: ubuntu-latest
    environment: acceptance
    needs: testing
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: javac src/*.java
      - name: Package application
        run: jar cvf jabberpoint.jar -C src .

  production:
    runs-on: ubuntu-latest
    environment: production
    needs: acceptance
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: javac src/*.java
      - name: Package final application
        run: jar cvf jabberpoint-release.jar -C src .